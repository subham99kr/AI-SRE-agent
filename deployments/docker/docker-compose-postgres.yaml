version: "3.9"

services:

  postgres:

    image: postgres:16

    container_name: ai-sre-postgres

    restart: unless-stopped

    environment:
      POSTGRES_DB: ai_sre
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres

    ports:
      - "5433:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d ai_sre"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:

  postgres_data: