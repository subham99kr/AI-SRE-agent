apiVersion: apps/v1
kind: Deployment
metadata:
  name: broken-app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: broken-app
  template:
    metadata:
      labels:
        app: broken-app
    spec:
      containers:
      - name: crash
        image: busybox
        command:
        - sh
        - -c
        - |
          echo "Starting..."
          echo "Connecting to database..."
          echo "Database connection failed"
          exit 1